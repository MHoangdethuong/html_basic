<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box model & position</title>
    <style>
      .block-element {
        display: block;
      }

      .inline-element {
        display: inline;
      }

      .inline-block-element {
        display: inline-block;
      }

      .none-element {
        display: none;
      }

      .box {
        width: 100px;
        height: 100px;
        border: solid black;
        margin: 15px;
        padding: 50px;
      }

      div.box1 {
        background-color: antiquewhite;
      }

      div.box2 {
        background-color: aqua;
      }

      div.box3 {
        background-color: brown;
      }

      div.parent {
        display: flex;
      }
    </style>
  </head>

  <body>
    <div class="block-element">Block Element</div>
    <span class="inline-element">Inline Element</span>
    <div class="inline-block-element">Inline-Block Element</div>
    <div class="none-element">This will not be displayed</div>
    <div class="parent">
      <div class="box box1">box 1</div>
      <div class="box box2">box 2</div>
      <div class="box box3">box 3</div>
      <div class="box box3" style="background: green">box 4</div>
    </div>
  </body>
</html>
